<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASUCRI - Gestión de Negocio</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js para los gráficos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SweetAlert2 CSS y JS -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.6/dist/sweetalert2.all.min.js"></script>
    <!-- Librerías para Exportar PDF y Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        .login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }
    </style>
</head>

<body class="bg-light">

    <!-- PANTALLA DE LOGIN -->
    <div id="login-container" class="login-screen">
        <div class="card shadow p-4 text-center" style="max-width: 400px; width: 100%;">
            <h2 class="mb-4 text-primary fw-bold">MASUCRI</h2>
            <button id="btn-login" class="btn btn-dark btn-lg w-100 mt-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-google me-2" viewBox="0 0 16 16">
                    <path
                        d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                </svg>
                Iniciar sesión
            </button>
        </div>
    </div>

    <!-- APLICACIÓN PRINCIPAL (Flex column para el footer) -->
    <div id="app-container" class="d-none d-flex flex-column min-vh-100">

        <!-- Menú de Navegación -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">MASUCRI</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" id="nav-registro">Registro Diario</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="nav-reportes">Reportes y Gráficos</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center mt-2 mt-lg-0">
                        <span id="user-info" class="text-white me-3"></span>
                        <button id="btn-logout" class="btn btn-sm btn-outline-danger">Salir</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Contenido Central -->
        <div class="container flex-grow-1">

            <!-- VISTA 1: REGISTRO -->
            <div id="vista-registro" class="view-section active">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card shadow-sm mb-5">
                            <div class="card-header bg-primary text-white fw-bold">
                                Registrar Movimiento
                            </div>
                            <div class="card-body">
                                <form id="form-movimiento">
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">Tipo de Movimiento</label>
                                            <select id="tipo" class="form-select" required>
                                                <option value="entrada">Entrada (Venta/Ingreso)</option>
                                                <option value="salida">Salida (Gasto/Compra)</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mt-3 mt-md-0">
                                            <label class="form-label fw-semibold">Fecha</label>
                                            <input type="date" id="fecha" class="form-control" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Concepto / Descripción</label>
                                        <input type="text" id="descripcion" class="form-control"
                                            placeholder="Ej. Camiseta sublimada, o compra de material..." required>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label fw-semibold">Cliente / Proveedor</label>
                                            <input type="text" id="entidad" class="form-control"
                                                placeholder="Nombre (Opcional)">
                                        </div>
                                        <div class="col-md-6 mt-3 mt-md-0">
                                            <label class="form-label fw-semibold">Monto Total (₡)</label>
                                            <input type="number" id="monto" class="form-control" required min="1"
                                                step="0.01">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Guardar
                                        Movimiento</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VISTA 2: REPORTES Y GRÁFICOS -->
            <div id="vista-reportes" class="view-section">

                <!-- Búsqueda, Filtros y Exportación en Tiempo Real -->
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-body bg-white rounded">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label small text-muted mb-1 fw-bold">Buscar en tiempo real</label>
                                <input type="text" id="busqueda-texto"
                                    class="form-control form-control-sm border-primary"
                                    placeholder="Escribe un producto, cliente o concepto...">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-muted mb-1">Mostrar</label>
                                <select id="filtro-modo" class="form-select form-select-sm">
                                    <option value="ambos">Todo</option>
                                    <option value="entradas">Entradas</option>
                                    <option value="salidas">Salidas</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-muted mb-1">Desde</label>
                                <input type="date" id="filtro-inicio" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-muted mb-1">Hasta</label>
                                <input type="date" id="filtro-fin" class="form-control form-control-sm">
                            </div>
                            <div class="col-md-2">
                                <button id="btn-limpiar" class="btn btn-sm btn-outline-secondary w-100">Ver
                                    Todo</button>
                            </div>
                        </div>
                        <hr class="my-3">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <span class="small text-muted fw-semibold">Descargar datos de la vista actual:</span>
                            <div>
                                <button id="btn-export-pdf" class="btn btn-sm btn-danger px-3 shadow-sm">📄 Exportar
                                    PDF</button>
                                <button id="btn-export-excel" class="btn btn-sm btn-success px-3 shadow-sm">📊 Exportar
                                    Excel</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tarjetas de Resumen -->
                <div class="row mb-4 justify-content-center" id="contenedor-resumen">
                    <div class="col-md-4 mb-3" id="card-entradas">
                        <div class="card text-bg-success shadow-sm text-center h-100">
                            <div class="card-body">
                                <h6>Total Entradas</h6>
                                <h3 id="resumen-entradas">₡0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3" id="card-salidas">
                        <div class="card text-bg-danger shadow-sm text-center h-100">
                            <div class="card-body">
                                <h6>Total Salidas</h6>
                                <h3 id="resumen-salidas">₡0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3" id="card-balance">
                        <div class="card text-bg-info text-white shadow-sm text-center h-100">
                            <div class="card-body">
                                <h6>Balance</h6>
                                <h3 id="resumen-balance">₡0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Gráfico y Tabla -->
                <div class="row">
                    <div class="col-lg-4 mb-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-header bg-white fw-bold">Gráfico</div>
                            <div class="card-body d-flex justify-content-center align-items-center">
                                <canvas id="miGrafico"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8 mb-4">
                        <div class="card shadow-sm h-100 border-0">
                            <div class="card-header bg-white fw-bold">Detalle de Movimientos</div>
                            <div class="card-body table-responsive p-0" style="max-height: 500px; overflow-y: auto;">
                                <table class="table table-hover align-middle m-0">
                                    <thead class="table-light sticky-top shadow-sm">
                                        <tr>
                                            <th>Fecha</th>
                                            <th>Concepto</th>
                                            <th>Monto</th>
                                            <th class="text-center">Acciones</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-reportes">
                                        <!-- Datos inyectados por JS -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="bg-dark text-white text-center py-3 mt-4 shadow-lg">
            <div class="container">
                <p class="mb-0 fw-bold fs-5">MASUCRI</p>
                <small class="text-white-50">Sistema de Gestión y Control © 2026</small>
            </div>
        </footer>

    </div>

    <!-- MODAL DE EDICIÓN -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold">Editar Movimiento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="form-editar">
                        <input type="hidden" id="edit-id">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Tipo</label>
                                <select id="edit-tipo" class="form-select" required>
                                    <option value="entrada">Entrada</option>
                                    <option value="salida">Salida</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha</label>
                                <input type="date" id="edit-fecha" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Concepto</label>
                            <input type="text" id="edit-descripcion" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Entidad</label>
                                <input type="text" id="edit-entidad" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Monto (₡)</label>
                                <input type="number" id="edit-monto" class="form-control" required min="1" step="0.01">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold shadow-sm">Actualizar
                            Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
