<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASUCRI - Gestión de Negocio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }
    </style>
</head>

<body class="bg-light">

    <div id="login-container" class="login-screen">
        <div class="card shadow p-4 text-center" style="max-width: 400px; width: 100%;">
            <h2 class="mb-4 text-primary fw-bold">MASUCRI</h2>
            <button id="btn-login" class="btn btn-dark btn-lg w-100 mt-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-google me-2" viewBox="0 0 16 16">
                    <path
                        d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                </svg>
                Iniciar sesión con Google
            </button>
        </div>
    </div>

    <div id="app-container" class="d-none">

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">MASUCRI</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#" id="nav-registro">Registro Diario</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="nav-reportes">Reportes y Gráficos</a>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center mt-2 mt-lg-0">
                        <span id="user-info" class="text-white me-3"></span>
                        <button id="btn-logout" class="btn btn-sm btn-outline-danger">Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div id="vista-registro" class="view-section active">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card shadow-sm">
                            <div class="card-header bg-primary text-white fw-bold">
                                Registrar Movimiento (Entrada / Salida)
                            </div>
                            <div class="card-body">
                                <form id="form-movimiento">
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Tipo de Movimiento</label>
                                            <select id="tipo" class="form-select" required>
                                                <option value="entrada">Entrada (Venta/Ingreso)</option>
                                                <option value="salida">Salida (Gasto/Compra)</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Fecha</label>
                                            <input type="date" id="fecha" class="form-control" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Concepto / Descripción</label>
                                        <input type="text" id="descripcion" class="form-control"
                                            placeholder="Ej. 100cm2 de vinil textil, o venta de teclado Logitech G300s..."
                                            required>
                                    </div>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Cliente / Proveedor</label>
                                            <input type="text" id="entidad" class="form-control"
                                                placeholder="Nombre de persona o local">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Monto (₡)</label>
                                            <input type="number" id="monto" class="form-control" required min="1">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Guardar Movimiento</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="vista-reportes" class="view-section">

                <div class="card shadow-sm mb-4">
                    <div class="card-body d-flex flex-wrap gap-3 align-items-end">
                        <div>
                            <label class="form-label small text-muted mb-1">Desde</label>
                            <input type="date" id="filtro-inicio" class="form-control form-control-sm">
                        </div>
                        <div>
                            <label class="form-label small text-muted mb-1">Hasta</label>
                            <input type="date" id="filtro-fin" class="form-control form-control-sm">
                        </div>
                        <button id="btn-filtrar" class="btn btn-sm btn-dark">Aplicar Filtro</button>
                        <button id="btn-limpiar" class="btn btn-sm btn-outline-secondary">Ver Todo (Histórico)</button>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card text-bg-success shadow-sm text-center">
                            <div class="card-body">
                                <h6>Total Entradas</h6>
                                <h3 id="resumen-entradas">₡0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mt-3 mt-md-0">
                        <div class="card text-bg-danger shadow-sm text-center">
                            <div class="card-body">
                                <h6>Total Salidas</h6>
                                <h3 id="resumen-salidas">₡0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mt-3 mt-md-0">
                        <div class="card text-bg-info text-white shadow-sm text-center">
                            <div class="card-body">
                                <h6>Balance (Ganancia)</h6>
                                <h3 id="resumen-balance">₡0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-lg-5 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white fw-bold">Gráfico de Movimientos</div>
                            <div class="card-body d-flex justify-content-center align-items-center">
                                <canvas id="miGrafico"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white fw-bold">Detalle de Movimientos</div>
                            <div class="card-body table-responsive p-0" style="max-height: 400px; overflow-y: auto;">
                                <table class="table table-hover m-0">
                                    <thead class="table-light sticky-top">
                                        <tr>
                                            <th>Fecha</th>
                                            <th>Tipo</th>
                                            <th>Concepto</th>
                                            <th>Monto</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-reportes">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="app.js"></script>
</body>

</html>
