<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASUCRI - Gestión de Trabajos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Un poco de CSS personalizado para centrar el login */
        .login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <div id="login-container" class="login-screen">
        <div class="card shadow p-4 text-center" style="max-width: 400px; width: 100%;">
            <h2 class="mb-4 text-primary fw-bold">MASUCRI</h2>
            <p class="text-muted">Sistema de Gestión de Ventas</p>
            <button id="btn-login" class="btn btn-outline-dark btn-lg w-100 mt-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                    class="bi bi-google me-2" viewBox="0 0 16 16">
                    <path
                        d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                </svg>
                Iniciar sesión con Google
            </button>
        </div>
    </div>

    <div id="app-container" class="d-none">

        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">MASUCRI</a>
                <div class="d-flex align-items-center">
                    <span id="user-info" class="text-white me-3 d-none d-md-block"></span>
                    <button id="btn-logout" class="btn btn-sm btn-danger">Cerrar Sesión</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row mb-4">
                <div class="col-md-6 mb-3">
                    <div class="card text-bg-success shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title">Ingresos del Mes</h5>
                            <h2 class="card-text" id="total-income">₡ 0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <div class="card text-bg-info text-white shadow-sm h-100">
                        <div class="card-body">
                            <h5 class="card-title">Trabajos Realizados</h5>
                            <h2 class="card-text" id="total-sales">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold">
                            Registrar Nuevo Trabajo
                        </div>
                        <div class="card-body">
                            <form id="sales-form">
                                <div class="mb-3">
                                    <label class="form-label">Nombre del Cliente</label>
                                    <input type="text" id="cliente" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descripción del Trabajo</label>
                                    <textarea id="descripcion" class="form-control" rows="3"
                                        placeholder="Ej. Camiseta sublimada, o 50cm2 de vinil textil..."
                                        required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Monto Total (₡)</label>
                                    <input type="number" id="monto" class="form-control" required min="0">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" id="fecha" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Estado</label>
                                    <select id="estado" class="form-select">
                                        <option value="Pendiente">Pendiente</option>
                                        <option value="Entregado">Entregado</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Guardar Trabajo</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8 mb-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
                            <span>Historial de Trabajos</span>
                        </div>
                        <div class="card-body table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Fecha</th>
                                        <th>Cliente</th>
                                        <th>Descripción</th>
                                        <th>Monto</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="sales-table-body">
                                    <tr>
                                        <td colspan="5" class="text-center text-muted">Cargando datos...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="app.js"></script>
</body>

</html>
